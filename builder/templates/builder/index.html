<html>
   <title>Carrer Builder</title>
    <style>
        body{
            font-family: 'Inter',sans-serif;
            background: #f5f5f5;
            margin:0;

        }
        .container{
            width: 400px;
            margin:120px auto;
            background: #ffffff;
            padding : 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }
        h2{
            margin-top: 25px;
            text-align: center;
            margin-bottom: 25px;
            color: #222;

        }
        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border:1px solid #ddd;
            font-size: 14px;

        }
        input :focus{
            border-color: #2d6a4f;
            outline: none;

        }
        button{
            width: 100%;
            padding: 12px;
            background: #2d6a4f;
            color : white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover{
            background: #1b4332;
        }
    </style>

<body>
<h2>Smart Career & Resume Builder</h2>
<div class="container">
<form method="POST">
    {% csrf_token %}
    Name: <input type="text" name="name"><br><br>
    Skills (comma separated): 
    <input type="text" name="skills"><br><br>
    <button type="submit">Analyze</button>
</form>
</div>

</body>
</html>
